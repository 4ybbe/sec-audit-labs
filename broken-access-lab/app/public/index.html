<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SEC-AUDIT // Intelligence Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e4e4e7; } /* Font color brightened to zinc-200 */
        .mono { font-family: 'JetBrains Mono', monospace; }
        .sidebar { background-color: #080808; border-right: 1px solid #1f2937; }
        .nav-link { color: #a1a1aa; transition: 0.3s; border-left: 2px solid transparent; }
        .nav-link.active { color: #f97316; border-left: 3px solid #f97316; padding-left: 14px; font-weight: 600; }
        .card { background-color: #0a0a0a; border: 1px solid #27272a; }
        .console { font-size: 12px; background: #000; border: 1px solid #3f3f46; color: #fdba74; line-height: 1.6; }
        input { background: #000; border: 1px solid #3f3f46; color: #f97316; outline: none; }
        input:focus { border-color: #f97316; box-shadow: 0 0 10px rgba(249, 115, 22, 0.1); }
        .docs-overlay { background: rgba(0,0,0,0.92); backdrop-filter: blur(12px); z-index: 100; }
        .doc-text { color: #e4e4e7; line-height: 1.8; } /* Bright white-zinc for modal readability */
    .code-window {
        background: #0d0d0d;
        border: 1px solid #1e1e1e;
        border-radius: 4px;
        margin-top: 1.5rem;
    }
    .code-header {
        background: #141414;
        padding: 6px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e1e1e;
    }
    .code-lang { font-size: 9px; font-weight: bold; color: #f97316; letter-spacing: 1px; }
    .code-body { padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #e4e4e7; overflow-x: auto; }
    
    /* Syntax Highlighting */
    .token-keyword { color: #f97316; font-weight: bold; }
    .token-string { color: #a1a1aa; }
    .token-comment { color: #52525b; font-style: italic; }
</style>
</head>
<body class="flex min-h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 sidebar p-8 flex flex-col fixed h-full z-20 shadow-2xl">
        <h1 class="text-white font-bold mb-12 tracking-widest text-[11px] uppercase italic">Audit_Platform_v6</h1>
        <nav class="space-y-6 flex-1 text-zinc-100">
            <button onclick="tab('lab1', this)" class="nav-link block text-[10px] active uppercase text-left w-full tracking-widest">01. Access Control</button>
            <button onclick="tab('lab2', this)" class="nav-link block text-[10px] uppercase text-left w-full tracking-widest">02. Misconfiguration</button>
            <button onclick="tab('lab3', this)" class="nav-link block text-[10px] uppercase text-left w-full tracking-widest">03. Auth Failures</button>
            <button onclick="tab('lab4', this)" class="nav-link block text-[10px] uppercase text-left w-full tracking-widest">04. Crypto Failures</button>
        </nav>
        <div class="mt-auto pt-6 border-t border-zinc-800">
            <div id="prog-pct" class="text-[10px] mb-2 text-zinc-300 uppercase font-bold tracking-widest">Progress: 0%</div>
            <div class="w-full h-[3px] bg-zinc-900 rounded-full"><div id="prog-bar" class="h-full bg-orange-600 w-0 transition-all duration-1000 shadow-[0_0_12px_#ea580c]"></div></div>
        </div>
    </aside>

    <div id="success-banner" class="fixed top-0 left-0 w-full bg-orange-600 text-black py-2 text-center text-[11px] font-bold uppercase tracking-[0.4em] z-[110] hidden shadow-2xl">
        Flag Verified // Neutralized Successfully
    </div>

    <!-- MAIN AREA -->
    <main class="flex-1 ml-64 flex flex-col items-center justify-center p-10 relative">
        
        <!-- DOCS TOGGLE (MORE VISIBLE) -->
        <button onclick="toggleDocs()" class="absolute top-10 right-10 bg-zinc-900 border border-orange-500/50 text-orange-500 px-6 py-2 rounded-full hover:bg-orange-500 hover:text-black transition flex items-center gap-3 shadow-lg group">
            <span class="text-[10px] font-bold uppercase tracking-[0.2em]">View Technical Briefing</span>
            <svg class="group-hover:stroke-black" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </button>

        <div class="w-full max-w-xl">
            <!-- LAB 1 -->
            <div id="lab1" class="tab-pane">
                <h2 class="text-white text-2xl font-bold mb-4 tracking-tighter uppercase">Identity Management</h2>
                <p class="text-zinc-200 text-sm mb-8 leading-relaxed italic">Hint: Access system-level invoices to find the first breach.</p>
                <div class="card p-10 rounded-sm flex flex-col items-center">
                    <div class="flex gap-4 w-full">
                        <input type="number" id="l1-in" value="1001" class="px-5 py-3 w-full text-sm font-bold">
                        <button onclick="l1()" class="bg-orange-600 text-black px-10 text-[10px] font-bold uppercase hover:bg-orange-400 transition tracking-widest">Execute</button>
                    </div>
                    <div id="l1-out" class="console mt-8 p-6 w-full hidden whitespace-pre"></div>
                </div>
            </div>

            <!-- LAB 2 -->
            <div id="lab2" class="tab-pane hidden">
                <h2 class="text-white text-2xl font-bold mb-4 tracking-tighter uppercase italic">System Diagnostics</h2>
                <div class="card p-10 rounded-sm">
                    <button onclick="l2()" class="w-full border-2 border-zinc-800 py-4 text-[10px] font-bold hover:border-orange-500 transition text-zinc-300 tracking-[0.2em]">SCAN_DIAGNOSTICS</button>
                    <div id="l2-out" class="console mt-8 p-6 hidden whitespace-pre"></div>
                </div>
            </div>

            <!-- LAB 3 -->
            <div id="lab3" class="tab-pane hidden">
                <h2 class="text-white text-2xl font-bold mb-4 tracking-tighter uppercase italic text-orange-500">Authentication Probe</h2>
                <div class="card p-10 space-y-4 rounded-sm">
                    <input type="text" id="l3-u" placeholder="USERNAME_IDENTIFIER" class="w-full px-5 py-4 text-xs tracking-widest">
                    <button onclick="l3()" class="w-full bg-orange-600 text-black py-4 text-[10px] font-bold transition uppercase tracking-[0.2em]">Sign_In</button>
                    <div id="l3-out" class="console mt-8 p-6 hidden"></div>
                </div>
            </div>

            <!-- LAB 4 -->
            <div id="lab4" class="tab-pane hidden">
                <h2 class="text-white text-2xl font-bold mb-4 tracking-tighter uppercase italic">Cookie Interception</h2>
                <div class="card p-10 space-y-6 rounded-sm">
                    <div class="console p-4 italic text-zinc-300">Session_Data (Base64): cm9sZT11c2Vy</div>
                    <input type="text" id="l4-h" placeholder="RE-ENCODED_ADMIN_TOKEN" class="w-full px-5 py-4 text-xs tracking-widest font-bold">
                    <button onclick="l4()" class="w-full bg-zinc-800 hover:bg-orange-500 hover:text-black py-4 text-[10px] font-bold uppercase transition tracking-[0.2em]">Validate_Identity</button>
                    <div id="l4-out" class="console mt-8 p-6 hidden"></div>
                </div>
            </div>
        </div>

        <!-- FLAG VERIFY (HIGH CONTRAST) -->
        <div class="w-full max-w-xl mt-20 pt-10 border-t border-zinc-800 flex gap-4">
            <input type="text" id="flag-in" placeholder="SUBMIT_OBTAINED_FLAG" class="px-6 py-4 flex-1 text-[11px] font-bold tracking-[0.2em] uppercase placeholder:text-zinc-600">
            <button onclick="verify()" class="bg-zinc-100 text-black px-10 text-[11px] font-bold uppercase hover:bg-orange-500 transition shadow-[0_0_20px_rgba(255,255,255,0.05)]">Verify</button>
        </div>

    </main>

<div id="docs-modal" class="fixed inset-0 z-[150] flex items-center justify-center hidden docs-overlay p-6">
    <div class="max-w-5xl w-full bg-[#0a0a0a] border-2 border-orange-600 p-8 md:p-12 relative overflow-y-auto max-h-[90vh] shadow-2xl rounded-sm">
        <button onclick="toggleDocs()" class="absolute top-6 right-6 text-orange-500 hover:text-white font-bold text-[10px] uppercase tracking-widest border border-orange-500 px-4 py-2">Close [ESC]</button>
        
        <div id="docs-content" class="space-y-10">
            <!-- Content Injected via JS -->
        </div>
    </div>
</div>

<script>
    const briefings = {
        lab1: {
            title: "Broken Access Control (IDOR)",
            desc: "IDOR occurs when an application exposes a reference to an internal implementation object. Attackers can manipulate these references to access unauthorized data.",
            remedy: "Verify user permissions for the specific object requested in the database query.",
            codes: [
                { lang: "Node.js (Express)", code: "db.get('SELECT * FROM invoices WHERE id = ? AND user_id = ?', [invoiceId, req.user.id]);" },
                { lang: "PHP (PDO)", code: "$stmt = $pdo->prepare('SELECT * FROM invoices WHERE id = :id AND user_id = :uid');\n$stmt->execute(['id' => $id, 'uid' => $_SESSION['user_id']]);" },
                { lang: "Python (Django)", code: "invoice = get_object_or_404(Invoice, id=invoice_id, owner=request.user)" }
            ]
        },
        lab2: {
            title: "Security Misconfiguration",
            desc: "Leaking system internal paths and debug info through headers or unhandled exceptions provides a roadmap for attackers.",
            remedy: "Disable verbose error reporting and diagnostic endpoints in production environments.",
            codes: [
                { lang: "Node.js (Express)", code: "app.disable('x-powered-by');\napp.use((err, req, res, next) => res.status(500).send('Something went wrong'));" },
                { lang: "PHP (ini)", code: "ini_set('display_errors', 0);\nini_set('log_errors', 1);" },
                { lang: "Nginx (Config)", code: "server_tokens off;\nadd_header X-Content-Type-Options nosniff;" }
            ]
        },
        lab3: {
            title: "Authentication Failures (Enumeration)",
            desc: "Inconsistent error messages allow attackers to guess valid usernames and focus their brute-force attacks.",
            remedy: "Return generic error messages and implement rate limiting.",
            codes: [
                { lang: "Node.js", code: "if (!user || !validPass) return res.status(401).send('Invalid username or password');" },
                { lang: "Python (Flask)", code: "if not check_password_hash(user.password, password):\n    return 'Login failed', 401" },
                { lang: "Security Strategy", code: "// Implement account lockout or captchas after 5 failed attempts." }
            ]
        },
        lab4: {
            title: "Cryptographic Failures",
            desc: "Encoding (Base64) is not encryption. Attackers can hijack sessions by modifying the encoded data.",
            remedy: "Use cryptographically signed tokens or server-side session management.",
            codes: [
                { lang: "Node.js (JWT)", code: "const token = jwt.sign({ role: 'admin' }, process.env.SECRET_KEY, { expiresIn: '1h' });" },
                { lang: "PHP (Sodium)", code: "$sealed = crypto_secretbox($message, $nonce, $key);" },
                { lang: "Python (Fernet)", code: "from cryptography.fernet import Fernet\nf = Fernet(key)\ntoken = f.encrypt(b'role=admin')" }
            ]
        }
    };

    function toggleDocs(specificKey = null) {
    const modal = document.getElementById('docs-modal');
    const activeLabBtn = document.querySelector('.nav-link.active');
    
    let key = specificKey || (activeLabBtn.innerText.toLowerCase().includes('access') ? "lab1" : 
               activeLabBtn.innerText.toLowerCase().includes('misconfig') ? "lab2" : 
               activeLabBtn.innerText.toLowerCase().includes('auth') ? "lab3" : "lab4");

    const info = briefings[key];

    const highlight = (code) => {
        return code
            .replace(/(SELECT|FROM|WHERE|AND|INSERT|INTO|UPDATE|SET|DELETE|import|const|let|function|return|if|else|get_object_or_404|ini_set|add_header|jwt\.sign|crypto_secretbox|Fernet)/g, '<span class="token-keyword">$1</span>')
            .replace(/('.*?'|".*?"|`.*?`)/g, '<span class="token-string">$1</span>')
            .replace(/(\/\/.*|\/\*[\s\S]*?\*\/)/g, '<span class="token-comment">$1</span>');
    };

    let codeBlocks = info.codes.map(c => `
        <div class="code-window">
            <div class="code-header">
                <span class="code-lang">${c.lang}</span>
                <div class="flex gap-1.5"><div class="w-2 h-2 rounded-full bg-zinc-800"></div><div class="w-2 h-2 rounded-full bg-zinc-800"></div></div>
            </div>
            <div class="code-body">
                <pre><code>${highlight(c.code)}</code></pre>
            </div>
        </div>
    `).join('');

    document.getElementById('docs-content').innerHTML = `
        <div class="max-w-3xl mx-auto space-y-10">
            <!-- Header Section -->
            <div class="border-l-4 border-orange-600 pl-6">
                <h4 class="text-orange-500 font-bold uppercase text-[9px] tracking-[0.4em] mb-2">// SECURITY ADVISORY</h4>
                <h2 class="text-white text-3xl font-bold tracking-tight">${info.title}</h2>
            </div>

            <!-- Analysis Section -->
            <div class="space-y-4">
                <h5 class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest">Technical Analysis</h5>
                <p class="text-zinc-200 text-sm leading-relaxed">${info.desc}</p>
            </div>

            <!-- Strategy Section -->
            <div class="space-y-4">
                <h5 class="text-orange-500 text-[10px] font-bold uppercase tracking-widest">Remediation Strategy</h5>
                <p class="text-zinc-100 text-sm italic border-l border-zinc-800 pl-4 leading-relaxed">${info.remedy}</p>
            </div>

            <!-- Code Examples Section (Stacked) -->
            <div class="pt-6 border-t border-zinc-900">
                <h5 class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-4">Secure Implementation Examples</h5>
                ${codeBlocks}
            </div>
        </div>
    `;
    modal.classList.toggle('hidden');
}

        function switchTab(id, btn) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.remove('hidden');
            btn.classList.add('active');
        }

        function tab(id, btn) { switchTab(id, btn); }


        async function l1() {
            const res = await fetch(`/api/v1/billing/invoice/${document.getElementById('l1-in').value}`);
            const data = await res.json();
            const out = document.getElementById('l1-out');
            out.classList.remove('hidden');
            out.innerText = JSON.stringify(data, null, 4);
        }

        async function l2() {
            const res = await fetch('/api/v1/system/health');
            const data = await res.json();
            const out = document.getElementById('l2-out');
            out.classList.remove('hidden');
            out.innerText = `Headers Detected:\nX-Debug-Mode: Enabled\nX-Route-Leaked: /api/v1/system/debug/vars\n\nBody: ${JSON.stringify(data, null, 2)}`;
        }

        async function l3() {
            const res = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: document.getElementById('l3-u').value })
            });
            const data = await res.json();
            const out = document.getElementById('l3-out');
            out.classList.remove('hidden');
            out.innerText = `HTTP ${res.status}: ${data.message}`;
        }

        async function l4() {
            const res = await fetch('/api/v1/user/me', { headers: { 'x-session-data': document.getElementById('l4-h').value }});
            const data = await res.json();
            const out = document.getElementById('l4-out');
            out.classList.remove('hidden');
            out.innerText = JSON.stringify(data, null, 4);
        }

        async function verify() {
            const flagVal = document.getElementById('flag-in').value.trim();
            const res = await fetch('/api/verify-flag', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ flag: flagVal })
            });
            if (res.ok) {
                const data = await res.json();
                const p = JSON.parse(localStorage.getItem('p_v7') || '{}');
                p[data.lab] = true;
                localStorage.setItem('p_v7', JSON.stringify(p));
                
                // Show Banner
                const banner = document.getElementById('success-banner');
                banner.classList.remove('hidden');
                setTimeout(() => banner.classList.add('hidden'), 3000);
                
                // AUTO TRIGGER DOCS
                setTimeout(() => {
                    toggleDocs(data.lab);
                }, 1000);

                document.getElementById('flag-in').value = "";
                updateProgress();
            } else alert("INVALID_FLAG: ANALYSIS_REJECTED");
        }

        function updateProgress() {
            const p = JSON.parse(localStorage.getItem('p_v7') || '{}');
            const solved = Object.keys(p).length;
            const pct = Math.floor(solved / 4 * 100);
            document.getElementById('prog-bar').style.width = pct + '%';
            document.getElementById('prog-pct').innerText = `Progress: ${pct}%`;
        }
        updateProgress();
    </script>
</body>
</html>
